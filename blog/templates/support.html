{% extends "base.html" %}

{% block content %}
<h1>Support</h1>
<style>
    body { font-family: sans-serif; margin: 1rem; }
    .message { padding: .5rem; border: 1px solid #ccc; margin-bottom: .5rem; border-radius:4px; }
    .message.user { background: #e8f4ff; color: #000; }
    .message.support { background: #ffe8e8; color: #000; font-weight: bold; }
    #contact { margin-bottom: 1rem; }
    #controls { margin-top: 1rem; }
    textarea { width: 100%; height: 80px; }
</style>

<div id="contact">
    <strong>Contact us:</strong> <span id="support-email"></span> / <span id="support-phone"></span>
</div>
<div id="conversation"></div>
<div id="controls">
    <textarea id="newmsg" placeholder="Write your message..."></textarea><br>
    <button id="send">Send</button>
</div>

<script>
async function loadInfo(){
    const resp = await fetch('/support/info/');
    const data = await resp.json();
    document.getElementById('support-email').textContent = data.email;
    document.getElementById('support-phone').textContent = data.phone;
}
async function loadMessages(){
    const resp = await fetch('/support/messages/');
    const data = await resp.json();
    const conv = document.getElementById('conversation');
    conv.innerHTML = '';
    data.messages.forEach(m=>{
        const div = document.createElement('div');
        div.className = 'message ' + m.sender;
        div.textContent = m.sender + ': ' + m.content;
        conv.appendChild(div);
    });
}
const currentUserId = {{ user_id|default:'null' }};

async function sendMessage(){
    const text = document.getElementById('newmsg').value.trim();
    if(!text) return;
    const resp = await fetch('/support/send/', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({message:text})});
    if (resp.status == 302) {
        window.location.href = '/accounts/login/?next=/support/';
        return;
    }
    if (!resp.ok) {
        alert('Error sending message: ' + resp.status);
        return;
    }
    document.getElementById('newmsg').value='';
    loadMessages();
}

function initSupportWebsocket(){
    const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${wsProtocol}//${window.location.host}/ws/notify/`;
    const socket = new WebSocket(wsUrl);

    socket.addEventListener('open', () => {
        console.log('Support websocket connected', wsUrl);
    });

    socket.addEventListener('message', (event) => {
        try {
            const payload = JSON.parse(event.data);
            if (!payload || payload.event !== 'support_message') return;

            if (currentUserId && payload.user_id === currentUserId) {
                loadMessages();
            }
        } catch (err) {
            console.error('WebSocket message error', err);
        }
    });

    socket.addEventListener('close', () => {
        console.warn('Support websocket closed, reconnect in 1s');
        setTimeout(initSupportWebsocket, 1000);
    });

    socket.addEventListener('error', (err) => {
        console.error('Support websocket error', err);
        socket.close();
    });
}

document.getElementById('send').addEventListener('click',sendMessage);
loadInfo();
loadMessages();
initSupportWebsocket();
</script>
{% endblock %}
