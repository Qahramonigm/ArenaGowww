# Production Redis configuration for ArenaGo Channels Layer + Cache
# File location: /etc/redis/arenago.conf
# Start with: redis-server /etc/redis/arenago.conf

# ============================================================================
# NETWORK & SECURITY
# ============================================================================

# Bind to localhost only by default (update for remote Redis)
bind 127.0.0.1 ::1

# TCP backlog (connections waiting for accept)
tcp-backlog 511

# Timeout for idle clients (0 = no timeout)
timeout 0

# TCP keepalive (in seconds)
tcp-keepalive 300

# ============================================================================
# AUTHENTICATION
# ============================================================================

# Require password (generate with: openssl rand -hex 32)
requirepass YOUR_REDIS_AUTH_PASSWORD_HERE_CHANGE_ME

# ACM (Access Control List) for fine-grained permissions
# Require ID: arenago_channels with full access
user arenago_channels on >YOUR_REDIS_AUTH_PASSWORD_HERE_CHANGE_ME ~* &* +@all
user default on nopass ~* &* -@all

# ============================================================================
# GENERAL
# ============================================================================

# Enable protected mode (reject unknown clients unless auth provided)
protected-mode yes

# Daemonize: no (systemd handles this)
daemonize no

# Supervised by systemd
supervised systemd

# PID file path
pidfile /var/run/redis/redis-arenago.pid

# Logging
loglevel notice
logfile /var/log/redis/arenago.log

# Databases
databases 16

# ============================================================================
# SNAPSHOTS (RDB Persistence)
# ============================================================================

# Save to disk at intervals
# Format: save <seconds> <changes>
save 900 1       # At least 1 key changed, save every 900 sec (15 min)
save 300 10      # At least 10 keys changed, save every 300 sec (5 min)
save 60 10000    # At least 10000 keys changed, save every 60 sec (1 min)

# Disable RDB entirely (if using AOF only)
# save ""

# Compress RDB file using LZF
rdbcompression yes

# Checksum RDB file
rdbchecksum yes

# RDB file path
dbfilename dump.rdb

# RDB save directory
dir /var/lib/redis

# ============================================================================
# AOF (Append-Only File) - Recommended for Channels
# ============================================================================

# Enable AOF for durability
appendonly yes

# AOF filename
appendfilename "appendonly.aof"

# AOF fsync policy (write to disk)
# - always: fsync after every write (slow, durable)
# - everysec: fsync every second (good balance)
# - no: let OS decide (fast, less durable)
appendfsync everysec

# Combine AOF rewrite with fsync
no-appendfsync-on-rewrite no

# Trigger AOF rewrite when file grows 100% larger
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 67108864  # 64MB

# ============================================================================
# MEMORY MANAGEMENT
# ============================================================================

# Maximum memory Redis can use
maxmemory 1gb

# Memory eviction policy for Channels
# - allkeys-lru: evict any key using LRU (good for cache)
# - volatile-ttl: evict keys with TTL when limit reached
maxmemory-policy allkeys-lru

# LRU sample size
maxmemory-samples 5

# ============================================================================
# CHANNELS-SPECIFIC TUNING
# ============================================================================

# Increase max connections for many WebSocket clients
maxclients 50000

# Connection timeout (in seconds)
# Note: This must be larger than your channel layer expiry
timeout 300

# TCP keepalive to detect dead connections
tcp-keepalive 60

# ============================================================================
# SLOW LOG
# ============================================================================

# Log queries slower than specified microseconds
slowlog-log-slower-than 10000

# Keep last N slow log entries
slowlog-max-len 128

# ============================================================================
# CLUSTER (for HA - if not using standalone)
# ============================================================================

# cluster-enabled no
# cluster-config-file nodes.conf
# cluster-node-timeout 15000

# ============================================================================
# ADVANCED
# ============================================================================

# Hash table settings
hash-max-listpack-entries 512
hash-max-listpack-value 64

# List compression
list-max-listpack-size -2
list-compress-depth 0

# Set compression
set-max-intset-entries 512

# Sorted set compression
zset-max-listpack-entries 128
zset-max-listpack-value 64

# Hyrax LFU settings (LFU = Least Frequently Used eviction)
lfu-log-factor 10
lfu-decay-time 1

# Active defragmentation
activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100

# ============================================================================
# BLOCKING OPERATIONS
# ============================================================================

# Timeout for BLPOP, BRPOP, etc.
blpop-on-empty-command-empty-list-response nil

# ============================================================================
# MONITORING & STATS
# ============================================================================

# Enable command rename for security (optional)
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""

# ============================================================================
# TLS/SSL (if needed for remote connections)
# ============================================================================

# tls-port 6380
# tls-cert-file /etc/redis/certs/redis.crt
# tls-key-file /etc/redis/certs/redis.key
# tls-dh-params-file /etc/redis/certs/redis.dh
# tls-prefer-server-ciphers yes
# tls-protocols "TLSv1.2 TLSv1.3"
